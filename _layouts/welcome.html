<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到我的博客</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <style>
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(247,250,252,0.95) 100%),
                        url('../images/backgrounds/main-bg.png') no-repeat center center fixed;
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .welcome-content {
            text-align: center;
            animation: welcomePulse 2s ease-in-out infinite;
        }

        .welcome-text {
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.1);
            background: linear-gradient(135deg, var(--gradient) 0%, var(--gradient-reverse) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .loading-dots {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--gradient);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes welcomePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes dotPulse {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 欢迎屏幕 -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
            <h1 class="welcome-text">Welcome！</h1>
            <p class="welcome-subtitle">按任意键进入博客</p>
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <!-- 主要内容 -->
    <div class="site-main" id="mainContent">
        <!-- 这里将由JavaScript动态加载主页内容 -->
    </div>

    <!-- JavaScript -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
    <script>
        // 欢迎屏幕控制
        document.addEventListener('DOMContentLoaded', function() {
            const welcomeScreen = document.getElementById('welcomeScreen');
            const mainContent = document.getElementById('mainContent');
            
            // 监听键盘事件
            document.addEventListener('keydown', function() {
                hideWelcomeScreen();
            });
            
            // 监听鼠标点击事件
            document.addEventListener('click', function() {
                hideWelcomeScreen();
            });
            
            // 监听触摸事件（移动设备）
            document.addEventListener('touchstart', function() {
                hideWelcomeScreen();
            });
            
            function hideWelcomeScreen() {
                welcomeScreen.classList.add('fade-out');
                
                // 加载主页内容
                setTimeout(() => {
                    loadHomePage();
                    welcomeScreen.style.display = 'none';
                }, 500);
            }
            
            function loadHomePage() {
                // 使用fetch加载主页内容
                fetch('/')
                    .then(response => response.text())
                    .then(html => {
                        // 创建一个临时DOM元素来解析HTML
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        
                        // 提取主要内容
                        const homeContent = doc.querySelector('.home-layout');
                        if (homeContent) {
                            mainContent.innerHTML = '';
                            mainContent.appendChild(homeContent);
                            
                            // 重新初始化页面功能
                            initHomePage();
                        }
                    })
                    .catch(error => {
                        console.error('加载主页失败:', error);
                        // 如果加载失败，直接显示主页
                        window.location.href = '/';
                    });
            }
            
            // 防止在欢迎屏幕上滚动
            document.body.style.overflow = 'hidden';
        });
        
        // 初始化主页功能
        function initHomePage() {
            // 重新初始化背景切换器
            initBackgroundSwitcher();
            
            // 重新初始化时间轴
            initTimeline();
            
            // 重新初始化平滑滚动
            initSmoothScroll();
            
            // 重新初始化代码复制
            initCodeCopy();
            
            // 重新初始化搜索
            initSearch();
            
            // 重新初始化标签筛选
            initTagFilter();
            
            // 重新初始化滚动行为
            if (typeof initScrollBehavior === 'function') {
                initScrollBehavior();
            }
            
            // 恢复页面滚动
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>

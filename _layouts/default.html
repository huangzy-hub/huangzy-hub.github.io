<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ '/favicon.ico' | relative_url }}">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}">
</head>
<body>
    <!-- 导航栏 -->
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <div class="site-title-container">
                    <img src="{{ '/assets/images/head/head.png' | relative_url }}" alt="头像" class="site-avatar">
                    <h1 class="site-title">
                        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
                    </h1>
                </div>
                <nav class="site-nav">
                    <a href="{{ '/' | relative_url }}" class="nav-link">首页</a>
                    <a href="{{ '/about' | relative_url }}" class="nav-link">关于</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="site-main">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. 由 GitHub Pages 提供支持.</p>
                <div class="social-links">
                    <a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% if page.layout == 'home' %}
    <script src="{{ '/assets/js/tag-search.js' | relative_url }}"></script>
    {% endif %}
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">
                <a href=" '/' | relative_url }}">{{ site.title }}</a >
            </h1>
            <nav class="site-nav">
                <a href="{{ '/' | relative_url }}">首页</a >
                <a href="{{ '/tags' | relative_url }}">标签</a >
                <a href="{{ '/about' | relative_url }}">关于</a >
                <a href="{{ '/archive' | relative_url }}">归档</a >
            </nav>
        </div>
    </header>

    <main class="site-main container">
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. 由 GitHub Pages 提供支持.</p >
        </div>
    </footer>
</body>
</html>

---
layout: default
---

<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
            <time>{{ page.date | date: "%Y年%m月%d日" }}</time>
            {% if page.categories %}
            <span class="categories">· {{ page.categories | join: ", " }}</span>
            {% endif %}
            {% if page.tags %}
            <span class="tags">· 标签: {{ page.tags | join: ", " }}</span>
            {% endif %}
        </div>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <footer class="post-footer">
        <a href=" '/' | relative_url }}" class="back-home">← 返回首页</a >
    </footer>
</article>

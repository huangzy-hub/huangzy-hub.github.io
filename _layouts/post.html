---
layout: default
---

<article class="post-page">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <div class="post-meta">
            <time class="post-date">{{ page.date | date: "%Y年%m月%d日" }}</time>
            {% if page.categories %}
            <span class="post-categories">· {{ page.categories | join: ", " }}</span>
            {% endif %}
        </div>
        
        {% if page.tags %}
        <div class="post-tags">
            {% for tag in page.tags %}
            <span class="tag">#{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <footer class="post-footer">
        <nav class="post-nav">
            <a href="{{ '/' | relative_url }}" class="back-home">← 返回首页</a>
        </nav>
    </footer>
</article>

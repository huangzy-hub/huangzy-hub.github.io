<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签筛选测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .tag-filter {
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        
        .tag-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .tag-filter-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tag-filter-btn:hover {
            background: #e9e9e9;
        }
        
        .tag-filter-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .post-card {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
        }
        
        .post-tags {
            margin-top: 10px;
        }
        
        .tag {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <h1>标签筛选功能测试</h1>
    
    <div class="tag-filter">
        <span class="filter-label">标签筛选：</span>
        <div class="tag-filters">
            <button class="tag-filter-btn active" data-tag="all">全部</button>
            <button class="tag-filter-btn" data-tag="GitHub">GitHub</button>
            <button class="tag-filter-btn" data-tag="web">web</button>
            <button class="tag-filter-btn" data-tag="blog">blog</button>
            <button class="tag-filter-btn" data-tag="网安">网安</button>
            <button class="tag-filter-btn" data-tag="逆向">逆向</button>
        </div>
    </div>
    
    <div class="posts-grid">
        <div class="post-card" data-date="2025-11-29">
            <h3>用GitHub Pages搭建个人网站</h3>
            <div class="post-tags">
                <span class="tag">#GitHub</span>
                <span class="tag">#web</span>
            </div>
        </div>
        
        <div class="post-card" data-date="2025-11-29">
            <h3>Git + GitHub 实战指南</h3>
            <div class="post-tags">
                <span class="tag">#GitHub</span>
                <span class="tag">#blog</span>
            </div>
        </div>
        
        <div class="post-card" data-date="2025-11-30">
            <h3>图片使用示例</h3>
            <div class="post-tags">
                <span class="tag">#web</span>
                <span class="tag">#blog</span>
            </div>
        </div>
        
        <div class="post-card" data-date="2025-12-01">
            <h3>RC4加密算法</h3>
            <div class="post-tags">
                <span class="tag">#网安</span>
                <span class="tag">#逆向</span>
            </div>
        </div>
        
        <div class="post-card" data-date="2025-12-01">
            <h3>CTFshow逆向RC4</h3>
            <div class="post-tags">
                <span class="tag">#网安</span>
                <span class="tag">#逆向</span>
            </div>
        </div>
    </div>

    <script>
        // 标签筛选功能测试
        function initTagFilter() {
            const tagFilterBtns = document.querySelectorAll('.tag-filter-btn');
            const postCards = document.querySelectorAll('.post-card');
            
            console.log('标签筛选功能初始化');
            console.log('找到标签按钮数量:', tagFilterBtns.length);
            console.log('找到文章卡片数量:', postCards.length);
            
            if (tagFilterBtns.length === 0 || postCards.length === 0) {
                console.log('标签筛选功能：未找到按钮或文章卡片');
                return;
            }
            
            tagFilterBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const selectedTag = this.getAttribute('data-tag');
                    
                    console.log('点击了标签按钮：', selectedTag);
                    
                    // 更新按钮状态
                    tagFilterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 筛选文章
                    let visibleCount = 0;
                    postCards.forEach(card => {
                        if (selectedTag === 'all') {
                            // 显示所有文章
                            card.style.display = 'block';
                            visibleCount++;
                        } else {
                            // 检查文章是否包含选中的标签
                            const tags = card.querySelectorAll('.tag');
                            let hasTag = false;
                            
                            tags.forEach(tag => {
                                const tagText = tag.textContent.replace('#', '').trim();
                                console.log('检查标签：', tagText, 'vs', selectedTag);
                                if (tagText === selectedTag) {
                                    hasTag = true;
                                }
                            });
                            
                            if (hasTag) {
                                card.style.display = 'block';
                                visibleCount++;
                                console.log('显示文章：', card.querySelector('h3').textContent);
                            } else {
                                card.style.display = 'none';
                                console.log('隐藏文章：', card.querySelector('h3').textContent);
                            }
                        }
                    });
                    
                    console.log('显示的文章数量：', visibleCount);
                });
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initTagFilter);
    </script>
</body>
</html>
